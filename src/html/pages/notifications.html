<div id="notifications_page" class="page">
  <section class="content-header header-space-between">
    <h1 data-i18n="notifications">notifications</h1>
  </section>
  <section class="content">
    <div class="container-fluid data-container">
      <table class="table table-striped" id="notifications_table">
        <thead>
          <tr>
            <th data-i18n="date">date</th>
            <th data-i18n="type">type</th>
            <th data-i18n="text">text</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <div class="data-loading-container"><i class="fas fa-circle-notch fa-spin fa-3x" style="display: block"></i></div>
      <div class="data-empty-container">
        <p data-i18n="no_ats_found">No notifications yet.</p>
      </div>
    </div>
  </section>
</div>
